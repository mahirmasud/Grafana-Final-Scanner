# Grafana Final Scanner CI/CD Pipeline
# Runs tests, linting, and builds across multiple Python versions

name: Grafana Scanner CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,__pycache__,tests/
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=12 --max-line-length=127 --statistics --exclude=.git,__pycache__

    - name: Verify syntax (all Python files)
      run: |
        python3 -c "
        import ast, glob
        files = glob.glob('**/*.py', recursive=True)
        errors = []
        for f in files:
            try:
                ast.parse(open(f).read())
            except SyntaxError as e:
                errors.append(f'{f}: {e}')
        if errors:
            print('Syntax errors found:')
            for e in errors:
                print(f'  {e}')
            exit(1)
        else:
            print(f'✓ All {len(files)} Python files have valid syntax')
        "

    - name: Test with pytest
      run: |
        python -m pytest tests/ -v --cov=scanner --cov-report=term-missing --cov-fail-under=70

    - name: Verify scanner imports
      run: |
        python -c "from scanner import GrafanaFinalScanner, _positive_int, Colors, main; print('✓ All imports successful')"
        python -c "from scanner import GrafanaFinalScanner; s = GrafanaFinalScanner(); print(f'✓ Scanner initialized (defaults: timeout={s.timeout}, threads={s.max_threads})')"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: grafana-scanner:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker build -t grafana-scanner:test .
        docker run --rm grafana-scanner:test --help | head -5
        echo "✓ Docker image built and tested successfully"

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [test, docker]
    if: always()

    steps:
    - name: Check build status
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        echo "| Docker Build | ✅ Built |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Grafana Final Scanner v2.0**" >> $GITHUB_STEP_SUMMARY
        echo "- 15 CVE checks" >> $GITHUB_STEP_SUMMARY
        echo "- Multi-format reporting (JSON, HTML, CSV)" >> $GITHUB_STEP_SUMMARY
        echo "- Authentication & parallel scanning support" >> $GITHUB_STEP_SUMMARY
